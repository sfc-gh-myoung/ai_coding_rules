name: PR Labeler

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label based on PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];
            
            // Conventional commit prefixes
            if (title.startsWith('feat')) labels.push('enhancement');
            if (title.startsWith('fix')) labels.push('bug');
            if (title.startsWith('docs')) labels.push('documentation');
            if (title.startsWith('chore')) labels.push('chore');
            if (title.startsWith('refactor')) labels.push('refactor');
            if (title.startsWith('test')) labels.push('test');
            if (title.startsWith('perf')) labels.push('enhancement');
            if (title.startsWith('ci')) labels.push('chore');
            if (title.startsWith('build')) labels.push('chore');
            
            // Breaking change detection
            if (title.includes('breaking') || title.includes('!:')) {
              labels.push('breaking');
            }
            
            if (labels.length > 0) {
              console.log(`Adding labels: ${labels.join(', ')}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels
              });
            } else {
              console.log('No matching prefix found in PR title');
            }
