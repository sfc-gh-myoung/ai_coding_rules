name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"
      prerelease:
        description: "Pre-release identifier (optional, e.g., alpha, beta.1, rc.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Calculate new version
        id: version
        run: |
          # Get current version from pyproject.toml
          CURRENT=$(awk -F'"' '/^version = "/ {print $2; exit}' pyproject.toml)
          echo "Current version: $CURRENT"
          
          # Parse semver components (strip any existing prerelease suffix)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT%%-*}"
          
          # Bump based on type
          case "${{ github.event.inputs.bump_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          
          # Add prerelease suffix if provided
          if [ -n "${{ github.event.inputs.prerelease }}" ]; then
            NEW_VERSION="${NEW_VERSION}-${{ github.event.inputs.prerelease }}"
          fi
          
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' pyproject.toml
          cat pyproject.toml | grep "^version"

      - name: Update version badge in README.md
        run: |
          sed -i 's/badge\/version-[0-9]*\.[0-9]*\.[0-9]*[^-]*/badge\/version-${{ steps.version.outputs.version }}-/' README.md
          grep "badge/version" README.md

      - name: Commit version bump
        run: |
          git add pyproject.toml README.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "⚠️ Tag ${TAG} already exists"
            exit 1
          fi
          git tag -a "${TAG}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${TAG}"

      - name: Find previous tag for changelog
        id: prev_tag
        run: |
          PREV_TAG=$(git tag -l "v*" --sort=-version:refname | grep -v "${{ steps.version.outputs.tag }}" | head -n 1)
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Create GitHub release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          
          if [ -n "$PREV_TAG" ]; then
            BODY="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          else
            BODY="Initial release ${VERSION}"
          fi
          
          # Determine if prerelease
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          
          gh release create "${TAG}" \
            --title "v${VERSION}" \
            --draft \
            --notes "$BODY" \
            $PRERELEASE_FLAG \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
