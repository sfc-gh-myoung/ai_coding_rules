version: '3.45'
# Taskfile v3 for AI Coding Rules (v3.0 - Production-Ready Rules Architecture)
# Usage: install Task and run `task` to see available commands
# All rules in rules/ are production-ready, no generation step required

set: [pipefail]

vars:
  UV: /opt/homebrew/bin/uv
  UVX: /opt/homebrew/bin/uvx
  PYTHON: /opt/homebrew/bin/uv run python

tasks:
  default:
    desc: "Show available tasks"
    silent: true
    cmds:
      - task -l

  # Environment
  env:python:
    desc: "Pin Python (3.11) and create uv venv"
    status:
      - test -d .venv
    cmds:
      - "{{.UV}} python install 3.11"
      - "{{.UV}} python pin 3.11"
      - "{{.UV}} venv"
  
  env:deps:
    desc: "Sync dev dependencies with uv"
    deps:
      - env:python
    cmds:
      - "{{.UV}} lock"
      - "{{.UV}} sync --all-groups"

  # Code Quality
  quality:lint:
    desc: "Ruff lint (check only)"
    cmds:
      - "{{.UVX}} ruff check ."

  quality:format:
    desc: "Ruff format (check only)"
    cmds:
      - "{{.UVX}} ruff format --check ."

  quality:lint:fix:
    desc: "Ruff lint with automatic fixes"
    cmds:
      - "{{.UVX}} ruff check --fix ."

  quality:format:fix:
    desc: "Ruff format (apply changes)"
    cmds:
      - "{{.UVX}} ruff format ."

  quality:type:
    desc: "ty type check (check only)"
    cmds:
      - "{{.UVX}} ty check ."

  quality:type:watch:
    desc: "ty type check with watch mode"
    cmds:
      - "{{.UVX}} ty check . --watch"

  quality:check:
    desc: "Run all quality checks"
    cmds:
      - task: quality:lint
      - task: quality:format
      - task: quality:type

  quality:fix:
    desc: "Fix all quality issues"
    cmds:
      - task: quality:lint:fix
      - task: quality:format:fix

  # Testing
  test:all:
    desc: "Run all pytest tests"
    deps:
      - env:deps
    cmds:
      - "{{.UV}} run pytest tests/ --tb=short"

  test:coverage:
    desc: "Run tests with coverage"
    deps:
      - env:deps
    cmds:
      - "{{.UV}} run pytest --cov=scripts --cov-report=term-missing --cov-report=html tests/"

  # Badges
  badges:update:
    desc: "Update README badges (version, test pass %)"
    deps:
      - env:deps
    cmds:
      - "{{.PYTHON}} scripts/badge_updater.py"

  # Rules & Index
  index:generate:
    desc: "Generate RULES_INDEX.md from rules/"
    cmds:
      - "{{.PYTHON}} scripts/index_generator.py"

  index:check:
    desc: "Check if RULES_INDEX.md is current"
    cmds:
      - "{{.PYTHON}} scripts/index_generator.py --check"

  index:dry:
    desc: "Preview RULES_INDEX.md generation"
    cmds:
      - "{{.PYTHON}} scripts/index_generator.py --dry-run"

  rules:validate:
    desc: "Validate production-ready rules using schema validator"
    cmds:
      - "{{.PYTHON}} scripts/schema_validator.py rules/"

  rules:validate:verbose:
    desc: "Validate rules with verbose error output"
    cmds:
      - "{{.PYTHON}} scripts/schema_validator.py rules/ --verbose"

  rule:new:
    desc: "Generate v3.0 compliant rule template (usage: task rule:new FILENAME=100-example [TIER=High] [KEYWORDS='key1, key2, ...'] [OUTPUT_DIR=custom/])"
    requires:
      vars: [FILENAME]
    cmds:
      - "{{.PYTHON}} scripts/template_generator.py {{.FILENAME}}{{if .OUTPUT_DIR}} --output-dir {{.OUTPUT_DIR}}{{end}}{{if .TIER}} --context-tier {{.TIER}}{{end}}{{if .KEYWORDS}} --keywords '{{.KEYWORDS}}'{{end}}"
      - echo "✅ Template created. Next steps:"
      - echo "1. Edit the file and replace placeholders"
      - echo "2. Validation will run automatically below..."
      - "{{.PYTHON}} scripts/schema_validator.py {{if .OUTPUT_DIR}}{{.OUTPUT_DIR}}{{else}}rules{{end}}/{{.FILENAME}}.md --verbose"

  rule:new:force:
    desc: "Generate rule template, overwriting if exists (usage: task rule:new:force FILENAME=100-example [TIER=High])"
    requires:
      vars: [FILENAME]
    cmds:
      - "{{.PYTHON}} scripts/template_generator.py {{.FILENAME}}{{if .OUTPUT_DIR}} --output-dir {{.OUTPUT_DIR}}{{end}}{{if .TIER}} --context-tier {{.TIER}}{{end}}{{if .KEYWORDS}} --keywords '{{.KEYWORDS}}'{{end}} --force"
      - echo "✅ Template created (overwritten). Next steps:"
      - echo "1. Edit the file and replace placeholders"
      - echo "2. Validation will run automatically below..."
      - "{{.PYTHON}} scripts/schema_validator.py {{if .OUTPUT_DIR}}{{.OUTPUT_DIR}}{{else}}rules{{end}}/{{.FILENAME}}.md --verbose"

  # Deployment
  deploy:
    desc: "Deploy production-ready rules (usage: task deploy DEST=<path>)"
    requires:
      vars: [DEST]
    cmds:
      - "{{.PYTHON}} scripts/rule_deployer.py --dest '{{.DEST}}'"

  deploy:dry:
    desc: "Preview deployment (usage: task deploy:dry DEST=<path>)"
    requires:
      vars: [DEST]
    cmds:
      - "{{.PYTHON}} scripts/rule_deployer.py --dest '{{.DEST}}' --dry-run"

  deploy:verbose:
    desc: "Deploy with verbose output (usage: task deploy:verbose DEST=<path>)"
    requires:
      vars: [DEST]
    cmds:
      - "{{.PYTHON}} scripts/rule_deployer.py --dest '{{.DEST}}' --verbose"

  # Token Budgets
  tokens:update:
    desc: "Update token budgets in rules/"
    cmds:
      - "{{.PYTHON}} scripts/token_validator.py"

  tokens:check:
    desc: "Check token budget accuracy"
    cmds:
      - "{{.PYTHON}} scripts/token_validator.py --dry-run --detailed"

  tokens:dry:
    desc: "Preview token budget updates"
    cmds:
      - "{{.PYTHON}} scripts/token_validator.py --dry-run"

  # Keyword Generation
  keywords:suggest:
    desc: "Suggest keywords for a rule file (usage: task keywords:suggest FILE=rules/100-example.md)"
    requires:
      vars: [FILE]
    cmds:
      - "{{.PYTHON}} scripts/keyword_generator.py {{.FILE}} --corpus"

  keywords:diff:
    desc: "Show diff between current and suggested keywords (usage: task keywords:diff FILE=rules/100-example.md)"
    requires:
      vars: [FILE]
    cmds:
      - "{{.PYTHON}} scripts/keyword_generator.py {{.FILE}} --corpus --diff"

  keywords:update:
    desc: "Update keywords in a rule file (usage: task keywords:update FILE=rules/100-example.md)"
    requires:
      vars: [FILE]
    cmds:
      - "{{.PYTHON}} scripts/keyword_generator.py {{.FILE}} --corpus --update"

  keywords:all:
    desc: "Suggest keywords for all rules in rules/ directory"
    cmds:
      - "{{.PYTHON}} scripts/keyword_generator.py rules/ --corpus"

  # Validation & CI
  validate:ci:
    desc: "Run all validation checks for CI/CD"
    cmds:
      - task: quality:check
      - task: quality:type
      - task: test:all
      - task: rules:validate
      - task: index:check

  # Maintenance
  clean:venv:
    desc: "Remove virtual environment"
    cmds:
      - rm -rf .venv

  clean:all:
    desc: "Remove all generated files and venv"
    cmds:
      - rm -rf .venv __pycache__ .pytest_cache htmlcov .coverage

  # Status
  status:
    desc: "Show project status"
    silent: true
    cmds:
      - |
        echo "AI Coding Rules v3.0 - Production-Ready Rules Architecture"
        echo ""
        echo "Rules: rules/ ($(find rules -name '*.md' | wc -l | tr -d ' ') files)"
        echo "Tests: $(find tests -name 'test_*.py' | wc -l | tr -d ' ') test files"
        echo ""
        if task quality:lint --silent 2>/dev/null; then
          echo "✓ Linting passed"
        else
          echo "✗ Linting issues (run: task quality:lint:fix)"
        fi
        if task quality:format --silent 2>/dev/null; then
          echo "✓ Formatting passed"
        else
          echo "✗ Formatting issues (run: task quality:format:fix)"
        fi
