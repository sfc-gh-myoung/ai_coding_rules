# YAML Schema for AI Coding Rules v3.2
# ==============================================================================
# Purpose: Validation schema for rule files per 002-rule-governance.md v3.2
# Usage: python scripts/schema_validator.py rules/NNN-rule.md
# ==============================================================================

$schema: "http://json-schema.org/draft-07/schema#"
version: "3.2"
description: "Validation schema for AI coding rules v3.2 (eliminated Purpose/Quick Start, added Scope, early References, Markdown-only Contract)"
last_updated: "2025-12-22"

# ==============================================================================
# METADATA VALIDATION RULES
# ==============================================================================
metadata:
  description: "Validation rules for file metadata fields"
  
  required_fields:
    - name: "SchemaVersion"
      format: "**SchemaVersion:**"
      type: "string"
      pattern: "^v\\d+\\.\\d+(\\.\\d+)?$"
      error_message: "SchemaVersion must be semantic version format (e.g., v3.1 or v3.1.0)"
      fix_suggestion: "Add **SchemaVersion:** v3.1 (or current schema version)"
      severity: "CRITICAL"
      docs_reference: "002-rule-governance.md Section 11.1"
    
    - name: "RuleVersion"
      format: "**RuleVersion:**"
      type: "string"
      pattern: "^v\\d+\\.\\d+\\.\\d+$"
      error_message: "RuleVersion must be semantic version format (e.g., v1.0.0)"
      fix_suggestion: "Add **RuleVersion:** v1.0.0 (or appropriate version)"
      severity: "HIGH"
      docs_reference: "002-rule-governance.md Section 11.1"
    
    - name: "LastUpdated"
      format: "**LastUpdated:**"
      type: "string"
      pattern: "^\\d{4}-\\d{2}-\\d{2}$"
      error_message: "LastUpdated must be date format YYYY-MM-DD (e.g., 2025-12-23)"
      fix_suggestion: "Add **LastUpdated:** YYYY-MM-DD with current date"
      severity: "HIGH"
      docs_reference: "002-rule-governance.md Section 11.1"
      description: "Timestamp for last significant update. Provides temporal context for troubleshooting when RuleVersion and SchemaVersion alone are insufficient. Helps identify when breaking changes occurred and track rule maintenance history."
    
    - name: "Keywords"
      format: "**Keywords:**"
      type: "array"
      min_items: 5
      max_items: 20
      item_type: "string"
      separator: ", "
      error_message: "Keywords must contain 5-20 comma-separated terms"
      fix_suggestion: "Add {needed} more semantic keywords for better discovery"
      severity: "HIGH"
      docs_reference: "002-rule-governance.md Section 11.1"
    
    - name: "TokenBudget"
      format: "**TokenBudget:**"
      type: "string"
      pattern: "^~[0-9]+$"
      accuracy_tolerance: 0.10  # ±10% of actual word count
      error_message: "TokenBudget must be format ~NUMBER (e.g., ~1500)"
      fix_suggestion: "Update to: ~{calculated_value}"
      severity: "MEDIUM"
      docs_reference: "002-rule-governance.md Section 11.1"
    
    - name: "ContextTier"
      format: "**ContextTier:**"
      type: "enum"
      allowed_values: ["Critical", "High", "Medium", "Low"]
      error_message: "ContextTier must be one of: Critical, High, Medium, Low"
      fix_suggestion: "Choose appropriate tier based on rule importance"
      severity: "HIGH"
      docs_reference: "002-rule-governance.md Section 11.1"
      description: "Secondary priority signal for context management. Primary preservation mechanism is natural language importance markers (CRITICAL/CORE/FOUNDATION) that work universally across all LLMs. ContextTier helps agents make fine-grained decisions within priority tiers. All four values remain valid and enforced by schema."
    
    - name: "Depends"
      format: "**Depends:**"
      type: "array"
      min_items: 1
      item_type: "string"
      pattern: "rules/[a-zA-Z0-9_-]+\\.md"
      check_file_exists: true
      allow_placeholders: ["000-global-core"]
      error_message: "Depends must list at least one prerequisite rule"
      fix_suggestion: "Add rules/000-global-core or other dependencies"
      severity: "HIGH"
      docs_reference: "002-rule-governance.md Section 11.1"
  
  # Optional metadata fields (used by index generator but not required for all rules)
  optional_fields:
    - name: "LoadTrigger"
      format: "**LoadTrigger:**"
      type: "array"
      item_type: "string"
      separator: ", "
      pattern: "^(ext:\\.[a-z0-9]+|file:[a-zA-Z0-9_.-]+|dir:[a-zA-Z0-9_/-]+|kw:[a-z0-9_-]+)$"
      description: "Triggers for automatic rule loading. Prefixes: ext: (file extension), file: (specific filename), dir: (directory), kw: (keyword)"
      example: "ext:.py, ext:.pyi, file:pyproject.toml"
      error_message: "LoadTrigger items must use prefix format: ext:.py, file:Dockerfile, dir:skills/, kw:test"
      severity: "MEDIUM"
      docs_reference: "002-rule-governance.md Section 11.1"
  
  field_order:
    required: true
    order: ["SchemaVersion", "RuleVersion", "LastUpdated", "Keywords", "TokenBudget", "ContextTier", "Depends"]
    optional_after: ["LoadTrigger"]  # Optional fields allowed after required fields
    error_message: "Metadata fields must appear in order: SchemaVersion, RuleVersion, LastUpdated, Keywords, TokenBudget, ContextTier, Depends (LoadTrigger optional after Depends)"
    fix_suggestion: "Reorder metadata fields per Section 11.1 of 002-rule-governance.md"
    severity: "HIGH"
    docs_reference: "002-rule-governance.md Section 11.1"
  
  placement:
    before_section: "Scope"
    error_message: "Metadata must appear before Scope section"
    fix_suggestion: "Move metadata to lines 3-7, immediately after H1 title"
    severity: "CRITICAL"
  
  header:
    required: true
    format: "## Metadata"
    placement: "after_h1_before_fields"
    error_message: "Metadata fields must be under ## Metadata header"
    fix_suggestion: "Add '## Metadata' header after H1 title, before metadata fields"
    severity: "HIGH"
    docs_reference: "002-rule-governance.md Section 11.1"

# ==============================================================================
# DOCUMENT STRUCTURE RULES
# ==============================================================================
structure:
  description: "Document structure validation rules"
  
  # Single H1 title requirement
  title:
    level: 1
    count: 1
    required: true
    pattern: "^# \\d+-[a-z]+-[a-z-]+$"
    error_message: "Must have exactly one H1 title matching pattern: # NNN-technology-aspect"
    fix_suggestion: "Ensure H1 title follows naming convention"
    severity: "CRITICAL"
    docs_reference: "002-rule-governance.md Section 4"
  
  # Required sections with validation rules
  required_sections:
    - name: "Scope"
      level: 2
      order: 1
      required: true
      max_paragraphs: 3
      placement:
        after: "Metadata"
        before: "References"
      content_validation:
        required_keywords: ["What This Rule Covers", "When to Load This Rule"]
        min_lines: 5
      error_message: "Scope section is required after Metadata"
      error_group: "Structure"
      severity: "CRITICAL"
      docs_reference: "002-rule-governance.md Section 11.2"
    
    - name: "References"
      level: 2
      order: 2
      required: true
      placement:
        after: "Scope"
        before: "Contract"
        max_percentage: 10
      content_validation:
        required_subsections: ["Dependencies", "External Documentation"]
        min_items: 1
      error_message: "References section is required early in file (after Scope, before Contract)"
      error_group: "Structure"
      severity: "HIGH"
      docs_reference: "002-rule-governance.md Section 11.2"
    
    - name: "Contract"
      level: 2
      order: 3
      required: true
      description: "Structured contract using Markdown headers (### subsections)"
      placement:
        after: "References"
        max_line_number: 200
        calculate_allowance: true
      content_validation:
        required_subsections:
          - "Inputs and Prerequisites"
          - "Mandatory"
          - "Forbidden"
          - "Execution Steps"
          - "Output Format"
          - "Validation"
          - "Post-Execution Checklist"
        no_xml_tags: true
        required_steps:
          min: 5
          max: 10
          pattern: "^\\s*\\d+\\."
      error_message: "Contract section is required after References (before line 200)"
      error_group: "Contract"
      severity: "CRITICAL"
      docs_reference: "002-rule-governance.md Section 11.3"
    
    - name: "Anti-Patterns and Common Mistakes"
      level: 2
      order: 4
      required: false
      description: "Problem/Correct Pattern pairs showing what NOT to do and why"
      content_validation:
        code_blocks:
          min: 2
        required_keywords: ["Problem:", "Correct Pattern:"]
        pattern_pairs:
          min: 2
          structure: "Problem:.*?Correct Pattern:"
      error_message: "Anti-Patterns and Common Mistakes section is strongly recommended but optional"
      error_group: "Anti-Patterns"
      severity: "MEDIUM"
      docs_reference: "002-rule-governance.md Section 5a"
  
  # Optional sections
  optional_sections:
    - name: "Key Principles"
      level: 2
      order_range: [4, 10]  # Between Contract and Output Format Examples
      content_validation:
        principle_count:
          min: 3
          max: 7
      docs_reference: "002-rule-governance.md Section 5"
  
  # Section order validation
  section_order:
    validate_sequence: true
    error_message: "Sections must appear in correct order per schema spec"
    fix_suggestion: "Reorder sections: Metadata → Scope → References → Contract → ... → Output Format Examples"
    severity: "HIGH"

# ==============================================================================
# CONTENT VALIDATION RULES
# ==============================================================================
content_rules:
  description: "Deep content validation beyond structure"
  
  contract:
    section: "Contract"
    validations:
      - type: "required_subsections"
        subsections:
          - name: "Inputs and Prerequisites"
            pattern: "###\\s+Inputs and Prerequisites"
            non_empty: true
          - name: "Mandatory"
            pattern: "###\\s+Mandatory"
            non_empty: true
          - name: "Forbidden"
            pattern: "###\\s+Forbidden"
            non_empty: true
          - name: "Execution Steps"
            pattern: "###\\s+Execution Steps"
            non_empty: true
          - name: "Output Format"
            pattern: "###\\s+Output Format"
            non_empty: true
          - name: "Validation"
            pattern: "###\\s+Validation"
            non_empty: true
          - name: "Post-Execution Checklist"
            pattern: "###\\s+Post-Execution Checklist"
            non_empty: true
        error_message: "Contract must contain all 7 required subsections (Markdown ### headers)"
        fix_suggestion: "Missing subsection: ### {subsection_name}"
        severity: "HIGH"
      
      - type: "no_xml_tags"
        forbidden_patterns: ["<inputs_prereqs>", "<mandatory>", "<forbidden>", "<steps>", "<output_format>", "<validation>", "<design_principles>"]
        error_message: "Contract must NOT use XML tags (v3.2 uses Markdown headers only)"
        fix_suggestion: "Replace XML tags with Markdown headers (###)"
        severity: "HIGH"
      
      - type: "numbered_list"
        name: "execution_steps"
        min: 5
        max: 10
        pattern: "^\\s*\\d+\\."
        error_message: "Contract Execution Steps must have 5-10 steps"
        fix_suggestion: "Current: {actual} steps. Add more explicit steps."
        severity: "MEDIUM"
  
  anti_patterns:
    section: "Anti-Patterns and Common Mistakes"
    validations:
      - type: "code_block_count"
        min: 2
        error_message: "Anti-Patterns should have at least 2 code examples for clarity"
        fix_suggestion: "Add code examples showing Problem and Correct Pattern"
        severity: "MEDIUM"
      
      - type: "keyword_presence"
        must_contain: ["Problem:", "Correct Pattern:"]
        error_message: "Anti-Patterns should show 'Problem:' and 'Correct Pattern:' structure"
        fix_suggestion: "Use structure: Problem: ... → Why It Fails: ... → Correct Pattern: ..."
        severity: "MEDIUM"
      
      - type: "pattern_pairs"
        min: 2
        pattern: "Problem:.*?Correct Pattern:"
        error_message: "Anti-Patterns must have at least 2 Problem → Correct Pattern pairs"
        severity: "MEDIUM"
  
  investigation_protocol:
    conditional:
      metadata_field: "ContextTier"
      values: ["Critical", "High"]
    validations:
      - type: "keyword_presence"
        must_contain_any: ["investigate", "research", "analyze", "understand", "review"]
        error_message: "High-tier rules must include investigation protocol"
        fix_suggestion: "Add investigation step in Required Steps or Key Principles"
        severity: "MEDIUM"

# ==============================================================================
# PLACEMENT RULES
# ==============================================================================
placement:
  description: "Section placement and positioning rules"
  
  metadata_placement:
    before_section: "Scope"
    error_message: "Metadata must appear before Scope section"
    severity: "CRITICAL"
  
  scope_placement:
    section: "Scope"
    after: "Metadata"
    before: "References"
    max_percentage: 5
    error_message: "Scope must be after Metadata, before References (early position)"
    severity: "CRITICAL"
    docs_reference: "002-rule-governance.md Section 11.2"
  
  references_placement:
    section: "References"
    after: "Scope"
    before: "Contract"
    max_percentage: 10
    error_message: "References must be after Scope, before Contract (early position)"
    severity: "CRITICAL"
    docs_reference: "002-rule-governance.md Section 11.2"

# ==============================================================================
# FORMAT RESTRICTIONS
# ==============================================================================
restrictions:
  description: "Format and markup restrictions"
  
  no_numbered_sections:
    enabled: true
    pattern: "^##\\s+\\d+\\."
    error_message: "Numbered sections (## 1., ## 2.) are not allowed in v3.2"
    fix_suggestion: "Replace with descriptive section names (e.g., '## Environment and Tooling Requirements')"
    severity: "HIGH"
    docs_reference: "002-rule-governance.md Section 11.2"
  
  no_emojis:
    enabled: true
    # Comprehensive emoji pattern covering multiple Unicode blocks:
    # - U+1F300-U+1F9FF: Emoticons, Miscellaneous Symbols and Pictographs
    # - U+2600-U+26FF: Miscellaneous Symbols (☀️, ⚠️, ✅, ❌, ⚡)
    # - U+2700-U+27BF: Dingbats (✓, ✗, ➜)
    pattern: "[\\U0001F300-\\U0001F9FF\\u2600-\\u26FF\\u2700-\\u27BF]"
    error_message: "Emojis are not allowed in rule files (text-only requirement)"
    fix_suggestion: "Replace emoji with text equivalent: ✅ → [PASS], ❌ → [FAIL], ⚠️ → [WARN]"
    severity: "CRITICAL"
    docs_reference: "002-rule-governance.md Section 11.5"
  
  no_yaml_frontmatter:
    enabled: true
    pattern: "^---\\s*$"
    error_message: "YAML frontmatter is not allowed (universal output format)"
    fix_suggestion: "Convert YAML frontmatter to inline **Field:** format"
    severity: "CRITICAL"
    docs_reference: "002-rule-governance.md Section 11"
  
  no_html_comments_in_rules:
    enabled: false  # HTML comments allowed in boilerplate, not in regular rules
    pattern: "<!--.*?-->"
    excluded_files: ["002a-rule-boilerplate.md"]
    error_message: "HTML comments should be removed from rule files"
    severity: "INFO"
  
  universal_format:
    enabled: true
    inline_metadata: true
    no_yaml_blocks: true
    markdown_only: true
    error_message: "File must use universal Markdown format"
    severity: "HIGH"

# ==============================================================================
# LINK VALIDATION
# ==============================================================================
link_validation:
  description: "Validate rule references and external URLs"
  
  rule_references:
    enabled: true
    pattern: "rules/[a-zA-Z0-9_-]+\\.md"
    check_exists: true
    allowed_placeholders:
      - "filename.md"
      - "rule-name.md"
      - "NNN-technology-core.md"
      - "000-global-core"
      - "NNN-rule.md"
      - "NNN-new-rule.md"
      - "NNN-technology-aspect.md"
      - "bad-rule.md"
      - "bad-rule-1.md"
      - "bad-rule-2.md"
      - "example.md"
      - "new-rule.md"
      - "215-python-django-core.md"
    error_message: "Referenced rule file does not exist: {file_path}"
    fix_suggestion: "Update reference or create the rule file"
    severity: "MEDIUM"
  
  external_urls:
    enabled: true
    pattern: "^https?://"
    check_reachable: false  # Optional, can be slow - disabled by default
    error_message: "External URL may be broken: {url}"
    severity: "INFO"
  
  references_section:
    # Subsections (### External Documentation, ### Related Rules) recommended but not mandatory
    # References section itself remains required for LLM grounding
    min_items: 1  # At least one reference (URL, rule, or doc)
    error_message: "References section should contain at least one reference"
    severity: "MEDIUM"
    
    # Validation for ### Related Rules subsection
    related_rules_subsection:
      required: false  # Subsection is recommended but optional
      rule_reference_format:
        # Rules can be referenced with or without 'rules/' prefix
        # The rules/ location is defined in AGENTS.md for token efficiency
        pattern: "([a-zA-Z0-9_-]+\\.md|rules/[a-zA-Z0-9_-]+\\.md)"
        # Allow root-level project files
        allowed_root_files:
          - "AGENTS.md"
          - "CHANGELOG.md"
          - "CONTRIBUTING.md"
          - "README.md"
          - "RULES_INDEX.md"
        # No error for missing prefix - both formats valid
        severity: "INFO"
        docs_reference: "002-rule-governance.md Section 11"

# ==============================================================================
# ERROR REPORTING CONFIGURATION
# ==============================================================================
error_reporting:
  description: "Configure error message formatting and grouping"
  
  group_by: "section"  # Group errors by which section they affect
  
  error_groups:
    - "Metadata"
    - "Structure"
    - "Quick Start"
    - "Contract"
    - "Anti-Patterns"
    - "Output Format"
    - "References"
    - "Format"
    - "Links"
  
  show_summary: true
  show_line_numbers: true
  show_context: true
  show_fix_suggestions: true
  
  format: "detailed"  # Options: minimal, standard, detailed
  
  severity_levels:
    CRITICAL:
      weight: 100
      symbol: "❌"
      description: "Must fix - blocking issue"
      fail_validation: true
    
    HIGH:
      weight: 75
      symbol: "⚠️ "
      description: "Should fix - important issue"
      fail_validation: true
    
    MEDIUM:
      weight: 50
      symbol: "ℹ️ "
      description: "Consider fixing - quality issue"
      fail_validation: false
    
    INFO:
      weight: 25
      symbol: "✓"
      description: "Informational - suggestion"
      fail_validation: false
  
  report_header: |
    ================================================================================
    VALIDATION REPORT: {file_path}
    ================================================================================
  
  report_summary: |
    SUMMARY:
      ❌ CRITICAL: {critical_count}
      ⚠️  HIGH: {high_count}
      ℹ️  MEDIUM: {medium_count}
      ✓ Passed: {passed_count} checks
  
  report_footer: |
    ================================================================================
    RESULT: {result_icon} {result_text}
    ================================================================================

# ==============================================================================
# EXCLUDED FILES
# ==============================================================================
excluded_files:
  description: "Files to skip during validation"
  files:
    - "README.md"
    - "CHANGELOG.md"
    - "CONTRIBUTING.md"
    - "RULES_INDEX.md"
    - "UNIVERSAL_PROMPT.md"
    - "AGENTS.md"
    - "002a-rule-boilerplate.md"  # Boilerplate is reference, not validated

# ==============================================================================
# VALIDATION BEHAVIOR
# ==============================================================================
validation:
  description: "Global validation behavior settings"
  
  fail_on_warnings: false  # Only fail on CRITICAL and HIGH by default
  strict_mode: false  # Can be enabled via --strict CLI flag
  parallel: false  # Can be enabled for directory validation
  cache_schema: true  # Cache parsed schema for performance
  max_errors_per_file: 100  # Stop after 100 errors to avoid spam
