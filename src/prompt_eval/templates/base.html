<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Prompt Eval{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-json-enc@2.0.3/json-enc.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="/ui" class="nav-brand">
                <span class="brand-icon">&#9670;</span>
                <span class="brand-text">prompt-eval</span>
                <span class="brand-version">v{{ version }}</span>
            </a>
            <div class="nav-links">
                <a href="/ui" class="nav-link {% block nav_eval %}{% endblock %}">Evaluate</a>
                <a href="/docs" class="nav-link" target="_blank">API Docs</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Prompt Eval &mdash; Universal prompt evaluation for LLM/agent execution quality</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
