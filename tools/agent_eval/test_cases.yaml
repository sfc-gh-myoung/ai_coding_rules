# ==============================================================================

  - test_id: "TC-034"
    category: "recovery_behavior"
    priority: "high"
    name: "Rule read failure offers options"
    description: "Failed rule load should offer recovery options A/B/C"
    test_input: "[SIMULATE: 200-python-core.md read failed]"
    test_note: "Requires simulation. Agent should offer: (A) Provide correct path, (B) Proceed without, (C) Cancel"
    pass_threshold: 100
    query_ids: []  # Populated during execution for debugging
    criteria:
      - "response matches (option|Options|A\\)|B\\)|C\\))"

  - test_id: "TC-035"
    category: "recovery_behavior"
    priority: "medium"
    name: "Partial rule loading continues"
    description: "If one domain rule fails but others succeed, agent continues with loaded rules per AGENTS.md Step 3D"
    test_input: "[SIMULATE: 200-python-core.md unavailable] Create a Python script with SQL queries"
    test_note: "Per AGENTS.md Step 3D: if read fails AND other rules loaded successfully, continue with successfully loaded rules. SQL rules should load even if Python rule fails."
    pass_threshold: 100
    query_ids: []  # Populated during execution for debugging
    criteria:
      - "foundation_loaded equals true"
      - "response matches (102-snowflake-sql-core|continue|proceed|SQL)"

# ==============================================================================
# CATEGORY: long_session
# PURPOSE: Verify protocol compliance under context pressure
# ==============================================================================

  - test_id: "TC-070"
    category: "long_session"
    priority: "high"
    name: "PRE-FLIGHT maintained after many turns"
    description: "Agent maintains protocol compliance after extended conversation"
    turns:
      - input: "Help me with Python"
      - input: "Now let's look at SQL"
      - input: "Back to Python again"
      - input: "What about JavaScript?"
      - input: "Let's do some bash scripting"
      - input: "Now help me with a Dockerfile"
    pass_threshold: 100
    test_note: "6th turn should still show PRE-FLIGHT (per AGENTS.md periodic refresh)"
    query_ids: []  # Populated during execution for debugging
    criteria:
      - "preflight_present equals true"
      - "foundation_loaded equals true"

  - test_id: "TC-071"
    category: "long_session"
    priority: "medium"
    name: "Rule refresh at 5th response"
    description: "AGENTS.md requires re-executing Steps 1-4 at 5th response"
    turns:
      - input: "Hello"
      - input: "How are you?"
      - input: "What's the weather?"
      - input: "Tell me a joke"
      - input: "Now help me write Python code"
    pass_threshold: 100
    test_note: "5th turn should show full gate execution per AGENTS.md periodic refresh check"
    query_ids: []  # Populated during execution for debugging
    criteria:
      - "gate1_checked equals true"
      - "gate2_checked equals true"
      - "gate3_checked equals true"

# ==============================================================================
# CATEGORY: model_robustness
# PURPOSE: Tests that expose model-specific quirks for filtering
# ==============================================================================

  - test_id: "TC-080"
    category: "model_robustness"
    priority: "medium"
    name: "Tool availability not falsely simulated"
    description: "Agent should not claim tools are unavailable when they exist"
    test_input: "Search the codebase for all pytest fixtures"
    pass_threshold: 100
    test_note: "Some models (openai-gpt-5) simulate tool unavailability. This test identifies that behavior."
    model_exceptions: ["openai-gpt-5"]
    query_ids: []  # Populated during execution for debugging
    criteria:
      - "gate2_checked equals true"
      - "response not_contains unavailable"

  - test_id: "TC-081"
    category: "model_robustness"
    priority: "low"
    name: "Consistent keyword extraction"
    description: "Same request should extract same keywords across runs"
    test_input: "Write pytest tests for the Streamlit dashboard"
    pass_threshold: 100
    query_ids: []  # Populated during execution for debugging
    criteria:
      - "gate2_keywords contains pytest"
      - "gate2_keywords contains streamlit"

